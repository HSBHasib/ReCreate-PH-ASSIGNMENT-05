<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | GitHub Issues Tracker</title>

    <!-- Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Css link -->
    <link rel="stylesheet" href="./style.css">

    <!-- DaisyUl CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="flex items-center justify-center min-h-screen bg-[#F8FAFC]">
        <div class="h-auto md:h-[90vh] shadow-lg w-[95%] sm:w-[80%] md:w-[28%] rounded-lg bg-white overflow-y-auto md:overflow-hidden">
            <div class="flex flex-col justify-center items-center py-4 space-y-2">
                <div class="flex justify-center items-center">
                    <img class="w-[60%] h-auto" src="./assets/github-logo.png" alt="GitHub_logo">
                </div>
                <div class="text-center">
                    <h2 class="font-semibold text-lg">GitHub Issues Tracker</h2>
                    <p class="text-[#64748B] text-[11px] ">Sign in to manage your issues</p>
                </div>
            </div>

            <div class="text-start px-6 -mt-3 pb-6 md:pb-0">
                <div>
                    <fieldset class="fieldset">
                        <legend class="fieldset-legend">Username</legend>
                        <input id="name" type="text" class="input placeholder:text-[#64748B] h-9 -mt-1 w-full" placeholder="Enter Username" />
                        <p class="label text-[#4A00FF]">Default: admin</p>

                        <legend class="fieldset-legend -mt-1">Password</legend>
                        <input id="pass" type="password" class="input placeholder:text-[#64748B] h-9 -mt-1 w-full" placeholder="Enter Password" />
                        <p class="label text-[#4A00FF]">Default: admin123</p>
                    </fieldset>

                    <button id="signIn-btn" class="btn bg-[#4A00FF] text-white w-full rounded-lg mt-2 h-9">Sign In</button>
                </div>


                <div class="relative flex items-center py-5">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="mx-2 text-gray-500 font-medium text-xs">OR</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>

                <div class="text-center space-y-2">
                    <p class="text-[#64748B] font-medium text-xs ">Demo Credentials:</p>

                    <div class="bg-[#F8FAFC] p-4 rounded-md mb-4">
                        <p class="text-xs text-[#1F2937] font-semibold">Username: admin </p>
                        <p class="text-xs text-[#1F2937] font-semibold">Password: admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
